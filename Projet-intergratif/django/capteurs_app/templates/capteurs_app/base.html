<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}SAE204 — Capteurs{% endblock %}</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: Arial, sans-serif;
            background: #f4f6f8;
            color: #333;
        }

        header {
            background: #1a73e8;
            color: white;
            padding: 14px 30px;
            display: flex;
            align-items: center;
            gap: 20px;
        }

        header h1 { font-size: 1.2rem; }

        header a {
            color: white;
            text-decoration: none;
            font-size: 0.9rem;
            opacity: 0.85;
        }

        header a:hover { opacity: 1; text-decoration: underline; }

        main {
            max-width: 1100px;
            margin: 30px auto;
            padding: 0 20px;
        }

        h2 { margin-bottom: 20px; font-size: 1.3rem; color: #1a73e8; }

        table {
            width: 100%;
            border-collapse: collapse;
            background: white;
            border-radius: 6px;
            overflow: hidden;
            box-shadow: 0 1px 4px rgba(0,0,0,.1);
        }

        th {
            background: #1a73e8;
            color: white;
            padding: 10px 14px;
            text-align: left;
            font-size: 0.9rem;
        }

        td {
            padding: 9px 14px;
            border-bottom: 1px solid #eee;
            font-size: 0.9rem;
        }

        tr:last-child td { border-bottom: none; }
        tr:hover td { background: #f0f4ff; }

        a { color: #1a73e8; text-decoration: none; }
        a:hover { text-decoration: underline; }

        .filter-bar {
            background: white;
            padding: 16px 20px;
            border-radius: 6px;
            box-shadow: 0 1px 4px rgba(0,0,0,.1);
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            align-items: flex-end;
            margin-bottom: 20px;
        }

        .filter-bar label {
            font-size: 0.82rem;
            color: #555;
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .form-input, .filter-bar input {
            padding: 7px 10px;
            border: 1px solid #ccc;
            border-radius: 4px;
            font-size: 0.9rem;
            min-width: 180px;
        }

        .form-input:focus, .filter-bar input:focus {
            outline: none;
            border-color: #1a73e8;
        }

        .btn {
            padding: 8px 18px;
            background: #1a73e8;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 0.9rem;
        }

        .btn:hover { background: #1558b0; }

        .btn-secondary {
            background: #6c757d;
        }

        .btn-secondary:hover { background: #545b62; }

        .card {
            background: white;
            border-radius: 6px;
            padding: 20px 24px;
            box-shadow: 0 1px 4px rgba(0,0,0,.1);
            margin-bottom: 24px;
        }

        .card h3 {
            font-size: 1rem;
            margin-bottom: 14px;
            color: #333;
            border-bottom: 1px solid #eee;
            padding-bottom: 8px;
        }

        .form-row {
            display: flex;
            flex-wrap: wrap;
            gap: 16px;
            align-items: flex-end;
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .form-group label {
            font-size: 0.82rem;
            color: #555;
        }

        .empty { color: #888; font-style: italic; padding: 16px 14px; }

        .badge {
            display: inline-block;
            background: #e8f0fe;
            color: #1a73e8;
            border-radius: 12px;
            padding: 2px 10px;
            font-size: 0.78rem;
        }
    </style>
</head>
<body>
    <header>
        <h1>SAE204 — Capteurs de température</h1>
        <a href="{% url 'capteurs_app:liste_capteurs' %}">← Liste des capteurs</a>
    </header>
    <main>
        {% block content %}{% endblock %}
    </main>
</body>
</html>
